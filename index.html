<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tonntris</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7fe0d0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header id="top-header">
            <h1 id="game-title">Tonntris <span class="version-tag">local</span></h1>
            <div id="mode-controls">
                <div class="mode-slider">
                    <div class="mode-slider-active"></div>
                    <div class="mode-option active" data-mode="chop">Chop</div>
                    <div class="mode-option" data-mode="puzzle">Puzzle</div>
                    <div class="mode-option" data-mode="gravity">Gravity</div>
                    <div class="mode-option" data-mode="midi">MIDI</div>
                </div>
            </div>
        </header>

        <div id="main-content">
            <aside id="sidebar">
                <div id="puzzle-stats" style="display: none;">
                    <p>Lines: <span id="lines-count">0</span></p>
                    <p>Best: <span id="puzzle-best-count">0</span></p>
                </div>

                <!-- Gravity Mode Controls & Stats -->
                <div id="gravity-controls" style="display: none;">
                    <div class="control-buttons">
                        <button id="gravity-start-pause">Pause</button>
                        <button id="gravity-reset">Restart</button>
                    </div>
                    <div class="stats-panel">
                        <p>Lines: <span id="gravity-lines-count">0</span></p>
                        <p>Best: <span id="gravity-best-count">0</span></p>
                        <p>Speed: <span id="gravity-speed-level">1.0x</span></p>
                    </div>
                </div>

                <!-- MIDI Mode Controls & Stats -->
                <div id="midi-controls" style="display: none;">
                    <div class="control-group">
                        <label for="midi-file-input" class="custom-file-upload">
                            Upload MIDI File
                        </label>
                        <input id="midi-file-input" type="file" accept=".mid,.midi" style="display: none;" />
                        <span id="midi-filename">Default: Hot Cross Buns</span>
                    </div>
                    <div class="control-buttons" style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;">
                        <button id="midi-play-preview">Play Melody</button>
                        <button id="midi-game-restart">Restart Game</button>
                    </div>
                    <div class="stats-panel" style="margin-top: 15px;">
                        <p>Current Streak: <span id="midi-current-streak">0</span></p>
                        <p>Longest Streak: <span id="midi-best-streak">0</span></p>
                        <p id="midi-game-status" style="font-size: 13px; color: var(--accent); margin-top: 10px; font-weight: bold; line-height: 1.4;">Listen to the notes...</p>
                    </div>
                </div>

                <div id="palette">
                    <div id="piece-list"></div>
                </div>

                <div id="controls">
                    <p class="desktop-only"><strong>F T Y H B V</strong>: Move</p>
                    <p class="desktop-only"><strong>Space / G / Arrows</strong>: Rotate (Shift-Space: CCW)</p>
                    <p id="placement-controls" class="desktop-only"><strong>Shift-G / Click</strong>: <span id="click-action">Place/Pick up</span></p>
                    <p id="chop-controls" class="desktop-only"><strong>Letters</strong>: Select Piece</p>
                </div>

                <!-- Mobile virtual controls pad -->
                <div id="mobile-controls" style="display: none;">
                    <div class="mobile-control-row">
                        <button id="m-btn-ccw" class="m-btn">↺</button>
                        <button id="m-btn-cw" class="m-btn">↻</button>
                    </div>
                    <div class="mobile-control-row">
                        <button id="m-btn-ul" class="m-btn">↖</button>
                        <button id="m-btn-ur" class="m-btn">↗</button>
                    </div>
                    <div class="mobile-control-row">
                        <button id="m-btn-left" class="m-btn">◀</button>
                        <button id="m-btn-right" class="m-btn">▶</button>
                    </div>
                    <div class="mobile-control-row">
                        <button id="m-btn-dl" class="m-btn">↙</button>
                        <button id="m-btn-dr" class="m-btn">↘</button>
                    </div>
                    <div class="mobile-control-row">
                        <button id="m-btn-action" class="m-btn long">Place / Drop</button>
                    </div>
                </div>
            </aside>

            <main id="game-container">
                <svg id="tonnetz-svg"></svg>
            </main>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="js/version.js"></script>
    <script src="js/tonnetz.js"></script>
    <script src="js/synth.js"></script>
    <script src="js/pieces.js"></script>
    <script src="js/board.js"></script>
    <script src="js/render.js"></script>
    <script src="js/chop.js"></script>
    <script src="js/puzzle.js"></script>
    <script src="js/gravity.js"></script>
    <script src="js/midi.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
