<!DOCTYPE html>
<html>
<head>
    <title>Tonncade - Unit Tests</title>
    <style>
        body { font-family: monospace; background: #14161c; color: #e7e9ee; padding: 20px; }
        .pass { color: #7fe0d0; }
        .fail { color: #f0b97f; font-weight: bold; }
        .group { margin-bottom: 20px; border-left: 2px solid #2a2e3a; padding-left: 15px; }
    </style>
</head>
<body>
    <h1>Lattice Math Tests</h1>
    <div id="results"></div>

    <!-- Mock DOM elements for App setup -->
    <div style="display:none;">
        <svg id="tonnetz-svg"></svg>
        <div id="puzzle-stats"></div>
        <div id="chop-controls"></div>
        <div id="click-action"></div>
        <div class="mode-slider-active"></div>
        <div class="mode-option" data-mode="midi"></div>
        <div class="mode-option" data-mode="chop"></div>
        <div class="mode-option" data-mode="snake"></div>
        <div class="mode-option" data-mode="puzzle"></div>
        <div class="mode-option" data-mode="gravity"></div>
        <div id="mobile-controls"></div>
        <div id="gravity-controls"></div>
        <div id="midi-controls"></div>
        <div id="snake-controls"></div>
        <div id="placement-controls"></div>
        <button id="m-btn-ccw"></button>
        <button id="m-btn-cw"></button>
        <button id="m-btn-ul"></button>
        <button id="m-btn-ur"></button>
        <button id="m-btn-left"></button>
        <button id="m-btn-right"></button>
        <button id="m-btn-dl"></button>
        <button id="m-btn-dr"></button>
        <button id="m-btn-action"></button>
        <!-- MIDI mode stats -->
        <span id="midi-current-streak"></span>
        <span id="midi-best-streak"></span>
        <span id="midi-game-status"></span>
        <!-- Snake mode stats -->
        <span id="snake-score"></span>
        <span id="snake-best-score"></span>
        <span id="snake-game-status"></span>
        <!-- Gravity mode stats -->
        <span id="gravity-lines-count"></span>
        <span id="gravity-best-count"></span>
        <span id="gravity-speed-level"></span>
    </div>

    <!-- Core Scripts -->
    <script src="../js/version.js"></script>
    <script src="../js/tonnetz.js"></script>
    <script src="../js/synth.js"></script>
    <script src="../js/pieces.js"></script>
    <script src="../js/board.js"></script>
    <script src="../js/render.js"></script>
    <script src="../js/chop.js"></script>
    <script src="../js/puzzle.js"></script>
    <script src="../js/gravity.js"></script>
    <script src="../js/midi.js"></script>
    <script src="../js/snake.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // Override onload so we can run App.init manually in a controlled test case
        window.onload = null;
    </script>
    <script>
        const results = document.getElementById('results');
        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = msg;
            results.appendChild(div);
        }

        function assert(condition, message) {
            if (condition) {
                log('✓ ' + message, 'pass');
                return true;
            } else {
                log('✗ ' + message, 'fail');
                return false;
            }
        }

        // Test Tonnetz Math
        log('Testing Tonnetz.js...', 'group');
        
        // C4 at (0,0)
        assert(Tonnetz.getMidi(0, 0) === 60, "Origin (0,0) should be MIDI 60 (C4)");
        assert(Tonnetz.getNoteName(60) === 'C', "MIDI 60 should be 'C'");
        
        // Fifths axis
        assert(Tonnetz.getMidi(1, 0) === 67, "(1,0) should be G4 (+7)");
        assert(Tonnetz.getNoteName(67) === 'G', "MIDI 67 should be 'G'");
        
        // Major Thirds axis
        assert(Tonnetz.getMidi(0, 1) === 64, "(0,1) should be E4 (+4)");
        assert(Tonnetz.getNoteName(64) === 'E', "MIDI 64 should be 'E'");
        
        // Minor Thirds axis (resultant)
        const min3 = Tonnetz.getMidi(-1, 1);
        assert(min3 === 63, "(-1,1) should be Eb4 (+3)");
        assert(Tonnetz.getNoteName(63) === 'D#', "MIDI 63 should be 'D#' (Eb)");

        // Octaves
        assert(Tonnetz.getOctave(60) === 4, "MIDI 60 is Octave 4");
        assert(Tonnetz.getOctave(24) === 1, "MIDI 24 is Octave 1");

        // Bounds
        assert(Tonnetz.isValid(0, 0) === true, "(0,0) is valid");
        assert(Tonnetz.isValid(100, 100) === false, "(100,100) is out of MIDI range");

        // Test Gravity Mode (rotated)
        log('Testing Gravity Mode (rotated) Tonnetz...', 'group');
        window.App = { currentMode: 'gravity' };
        
        // Origin (0,0) should be MIDI 35
        assert(Tonnetz.getMidi(0, 0) === 35, "Origin (0,0) in gravity should be MIDI 35");
        assert(Tonnetz.getNoteName(35) === 'B', "MIDI 35 should be 'B'");
        
        // p-axis (horizontal) step right (1,0) should be -3 semitones (32)
        assert(Tonnetz.getMidi(1, 0) === 32, "(1,0) in gravity should be G#1 (32)");
        assert(Tonnetz.getNoteName(32) === 'G#', "MIDI 32 should be 'G#'");
        
        // q-axis (up-right) step (0,1) should be +4 semitones (39)
        assert(Tonnetz.getMidi(0, 1) === 39, "(0,1) in gravity should be D#2 (39)");
        assert(Tonnetz.getNoteName(39) === 'D#', "MIDI 39 should be 'D#'");
        
        // resultant (up-left) step (-1,1) should be +7 semitones (42)
        assert(Tonnetz.getMidi(-1, 1) === 42, "(-1,1) in gravity should be F#2 (42)");
        assert(Tonnetz.getNoteName(42) === 'F#', "MIDI 42 should be 'F#'");

        // Test Isomorphism for Standard Mode
        log('Testing Standard Tonnetz Isomorphism...', 'group');
        let standardIsomorphic = true;
        for (let p = -20; p <= 20; p++) {
            for (let q = -20; q <= 20; q++) {
                const base = Tonnetz.getMidi(p, q);
                if (Tonnetz.getMidi(p + 1, q) - base !== 7 ||
                    Tonnetz.getMidi(p, q + 1) - base !== 3 ||
                    Tonnetz.getMidi(p - 1, q + 1) - base !== -4) {
                    standardIsomorphic = false;
                    break;
                }
            }
        }
        assert(standardIsomorphic === true, "Standard Tonnetz should be translationally isomorphic (p:+7, q:+3, resultant:-4) everywhere");

        // Test Isomorphism for Gravity Mode
        log('Testing Gravity Tonnetz Isomorphism...', 'group');
        window.App = { currentMode: 'gravity' };
        let gravityIsomorphic = true;
        for (let p = -20; p <= 20; p++) {
            for (let q = -20; q <= 20; q++) {
                const base = Tonnetz.getMidi(p, q);
                if (Tonnetz.getMidi(p + 1, q) - base !== -3 ||
                    Tonnetz.getMidi(p, q + 1) - base !== 4 ||
                    Tonnetz.getMidi(p - 1, q + 1) - base !== 7) {
                    gravityIsomorphic = false;
                    break;
                }
            }
        }
        assert(gravityIsomorphic === true, "Gravity Tonnetz should be translationally isomorphic (p:-3, q:+4, resultant:+7) everywhere");
        delete window.App;

        // Test Gravity Mode Cup Height (10 columns, 20 rows visible, 15 rows playable)
        log('Testing Gravity Mode Cup Dimensions (10x20 visible, 10x15 playable)...', 'group');
        
        // Mock cells
        Board.cells.clear();
        
        // Fill a complete row at q = 14 (the 15th row, top of playable cup)
        const rowQ = 14;
        const line = [];
        for (let col = -5; col <= 4; col++) {
            const p = col - Math.floor(rowQ / 2);
            Board.cells.set(`${p},${rowQ}`, { type: 'I', color: '#ffffff' });
            line.push({ p, q: rowQ });
        }
        
        const fullLines = Board.findFullLines();
        assert(fullLines.length === 1, "Completed 15th row (q = 14) should be detected");
        assert(fullLines[0].length === 10, "Row width should be 10 cells");
        
        // Fill a row at q = 15 (which is in the buffer/spawn zone, so it shouldn't clear)
        Board.cells.clear();
        const bufferQ = 15;
        for (let col = -5; col <= 4; col++) {
            const p = col - Math.floor(bufferQ / 2);
            Board.cells.set(`${p},${bufferQ}`, { type: 'I', color: '#ffffff' });
        }
        const fullLinesBuffer = Board.findFullLines();
        assert(fullLinesBuffer.length === 0, "Row in spawn zone (q = 15) should NOT be detected as a clearable line");
        
        Board.cells.clear();

        // Clean up mock
        delete window.App;

        // Test Pieces
        log('Testing Pieces.js...', 'group');
        
        assert(Pieces.TYPES['.'].cells.length === 1, "Solo piece '.' should have 1 cell");
        assert(Pieces.TYPES['-'].cells.length === 2, "Dimino '-' should have 2 cells");
        assert(Pieces.TYPES['|'].cells.length === 3, "Trimino '|' should have 3 cells");
        assert(Pieces.TYPES['>'].cells.length === 3, "Trimino '>' should have 3 cells");
        assert(Pieces.TYPES['<'].cells.length === 3, "Trimino '<' should have 3 cells");
        assert(Pieces.TYPES['V'].cells.length === 3, "Trimino 'V' should have 3 cells");

        const bar = Pieces.TYPES['I'].cells;
        assert(bar.length === 4, "Bar piece should have 4 cells");
        
        // Rotate Bar
        const barRotated = Pieces.rotate(bar);
        assert(barRotated[2].p === 0 && barRotated[2].q === 1, "Rotation: (1,0) should become (0,1)");
        
        const midisOrig = bar.map(c => Tonnetz.getMidi(c.p, c.q));
        const midisRot = barRotated.map(c => Tonnetz.getMidi(c.p, c.q));
        
        assert(midisOrig[1] - midisOrig[0] === 7, "Original Bar is fifths (+7)");
        assert(midisRot[1] - midisRot[0] === 4, "Rotated Bar is major thirds (+4)");
        
        const barRotated2 = Pieces.rotate(barRotated);
        const midisRot2 = barRotated2.map(c => Tonnetz.getMidi(c.p, c.q));
        assert(midisRot2[1] - midisRot2[0] === 3, "Double Rotated Bar is minor thirds (+3)");

        // Test Tonnetz.analyzeChord
        log('Testing Tonnetz.analyzeChord...', 'group');
        assert(Tonnetz.analyzeChord([60]) === null, "Single note [60] should return null");
        assert(Tonnetz.analyzeChord([60, 61, 62]) === null, "Unnamed combination [60, 61, 62] should return null");
        assert(Tonnetz.analyzeChord([60, 67]) === 'C 5 (Fifth) / G 4th', "Fifth [60, 67] should be analyzed as 'C 5 (Fifth) / G 4th'");
        assert(Tonnetz.analyzeChord([67, 74]) === 'G 5 (Fifth) / D 4th', "Fifth [67, 74] (G & D) should be analyzed as 'G 5 (Fifth) / D 4th'");
        assert(Tonnetz.analyzeChord([74, 67]) === 'G 5 (Fifth) / D 4th', "Inverted Fifth [74, 67] (D & G) should be analyzed as 'G 5 (Fifth) / D 4th'");
        assert(Tonnetz.analyzeChord([60, 64, 67]) === 'C Major', "Major triad [60, 64, 67] should be analyzed as 'C Major'");
        assert(Tonnetz.analyzeChord([60, 63, 67]) === 'C Minor', "Minor triad [60, 63, 67] should be analyzed as 'C Minor'");
        assert(Tonnetz.analyzeChord([62, 65, 72]) === 'D m7 (shell)', "D F C [62, 65, 72] should be analyzed as 'D m7 (shell)'");
        assert(Tonnetz.analyzeChord([60, 64, 67, 71]) === 'C Maj7', "Major 7th chord [60, 64, 67, 71] should be analyzed as 'C Maj7'");
        assert(Tonnetz.analyzeChord([57, 60, 64, 67]) === 'A m7 / C 6', "Minor 7th chord [57, 60, 64, 67] should be analyzed as 'A m7 / C 6'");

        // Test Tonnetz.analyzeAllChords
        log('Testing Tonnetz.analyzeAllChords...', 'group');
        const susAll = Tonnetz.analyzeAllChords([60, 67, 74]);
        assert(susAll.includes('C Sus2') && susAll.includes('G Sus4'), "C-G-D should return both C Sus2 and G Sus4");
        const pentAll = Tonnetz.analyzeAllChords([60, 67, 74, 81]);
        assert(pentAll.includes('C Pentatonic Stack'), "C-G-D-A should return C Pentatonic Stack");
        const m7b5All = Tonnetz.analyzeAllChords([57, 60, 63, 67]);
        assert(m7b5All.includes('A m7b5'), "A-C-Eb-G should return A m7b5");
        const sus7All = Tonnetz.analyzeAllChords([60, 65, 67, 70]);
        assert(sus7All.includes('C 7sus4'), "C-F-G-Bb should return C 7sus4");
        const mMaj7All = Tonnetz.analyzeAllChords([60, 63, 67, 71]);
        assert(mMaj7All.includes('C m(Maj7)'), "C-Eb-G-B should return C m(Maj7)");
        const quartalAll = Tonnetz.analyzeAllChords([60, 63, 65, 70]);
        assert(quartalAll.includes('C Quartal Stack'), "C-Eb-F-Bb should return C Quartal Stack");

        // Test App initialization and setMode crash prevention
        log('Testing App initialization...', 'group');
        window.App = App;
        try {
            App.init();
            log('✓ App.init() succeeded without crash', 'pass');
        } catch (err) {
            log('✗ App.init() failed with crash: ' + err.message, 'fail');
        }

        log('Lattice math and piece tests complete.');
    </script>
</body>
</html>
